kind = "web"
previewPath = "/"
title = "PioDev"
version = "1.0.0"
id = "artifacts/piodev"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19120
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/piodev run dev"

[services.env]
PORT = "19120"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/piodev", "run", "build"]
publicDir = "artifacts/piodev/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
